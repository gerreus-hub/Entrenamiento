<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#121212">
  <title>Timer Entrenamiento PWA</title>
  <link rel="manifest" href="manifest.webmanifest">
  <style>
    :root {
      --bg-idle: #121212;
      --bg-work: #1b5e20;
      --bg-rest: #b71c1c;
      --card: rgba(255,255,255,.10);
      --card-border: rgba(255,255,255,.12);
      --text: #fff;
      --muted: rgba(255,255,255,.72);
      --btn-dark: rgba(255,255,255,.18);
      --btn-light: #fff;
      --btn-light-text: #000;
      --shadow: 0 12px 40px rgba(0,0,0,.28);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg-idle);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      transition: background-color .35s ease;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      padding: 20px;
    }

    .app {
      width: min(100%, 760px);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 18px;
    }

    .config {
      width: min(100%, 520px);
      display: grid;
      grid-template-columns: repeat(2, minmax(120px, 1fr));
      gap: 14px;
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      padding: 16px;
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow);
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      text-align: left;
    }

    label {
      font-size: .78rem;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 700;
    }

    input {
      width: 100%;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.28);
      color: white;
      border-radius: 12px;
      padding: 14px 12px;
      font-size: 1.35rem;
      text-align: center;
      outline: none;
    }

    .status {
      font-size: clamp(1.5rem, 4vw, 2.2rem);
      letter-spacing: .12em;
      font-weight: 900;
      text-transform: uppercase;
    }

    .timer {
      font-size: clamp(5rem, 20vw, 10rem);
      font-weight: 900;
      line-height: .92;
      font-variant-numeric: tabular-nums;
    }

    .rounds {
      font-size: clamp(1rem, 2.8vw, 1.45rem);
      font-weight: 700;
      padding: 10px 22px;
      border-radius: 999px;
      background: rgba(0,0,0,.36);
      border: 1px solid rgba(255,255,255,.10);
    }

    .controls {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 8px;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 16px 24px;
      min-width: 150px;
      font-size: 1rem;
      font-weight: 800;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: var(--shadow);
    }

    .btn-primary {
      background: var(--btn-light);
      color: var(--btn-light-text);
    }

    .btn-secondary {
      background: var(--btn-dark);
      color: white;
      border: 1px solid rgba(255,255,255,.10);
    }

    .footer-info {
      display: flex;
      flex-direction: column;
      gap: 8px;
      color: var(--muted);
      font-size: .76rem;
      text-transform: uppercase;
      letter-spacing: .05em;
    }

    .hint {
      opacity: .8;
    }

    @media (max-width: 520px) {
      .config {
        grid-template-columns: 1fr;
      }
      button {
        width: 100%;
      }
      .controls {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="config" id="configPanel">
      <div class="input-group">
        <label for="inputWork">Trabajo (seg)</label>
        <input type="number" id="inputWork" value="30" min="1" inputmode="numeric">
      </div>
      <div class="input-group">
        <label for="inputRest">Descanso (seg)</label>
        <input type="number" id="inputRest" value="10" min="1" inputmode="numeric">
      </div>
    </section>

    <div id="status" class="status">Configurar</div>
    <div id="timerDisplay" class="timer">30</div>
    <div id="roundDisplay" class="rounds">Serie: 1</div>

    <div class="controls">
      <button type="button" class="btn-secondary" id="resetBtn">Reiniciar</button>
      <button type="button" class="btn-primary" id="startBtn">Empezar</button>
    </div>

    <div class="footer-info">
      <div id="wakeStatus">Pantalla normal</div>
      <div class="hint">Instalable como app · sonido · vibración</div>
    </div>
  </main>

  <script>
    let timerInterval = null;
    let isRunning = false;
    let isWork = true;
    let round = 1;
    let timeLeft = 30;
    let wakeLock = null;
    let audioCtx = null;

    const inputWork = document.getElementById('inputWork');
    const inputRest = document.getElementById('inputRest');
    const statusEl = document.getElementById('status');
    const timerDisplay = document.getElementById('timerDisplay');
    const roundDisplay = document.getElementById('roundDisplay');
    const startBtn = document.getElementById('startBtn');
    const resetBtn = document.getElementById('resetBtn');
    const wakeStatus = document.getElementById('wakeStatus');

    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
    }

function playSound(freq, duration) {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
      
      // Ganancia al 1.0 (máximo). El volumen ahora lo controlan las teclas de tu teléfono.
      gain.gain.setValueAtTime(1.0, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
      
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + duration);
    }

    function vibrate(pattern) {
      if ('vibrate' in navigator) navigator.vibrate(pattern);
    }

    async function requestWakeLock() {
      try {
        if ('wakeLock' in navigator) {
          wakeLock = await navigator.wakeLock.request('screen');
          wakeStatus.textContent = 'Pantalla siempre activa';
          wakeLock.addEventListener('release', () => {
            wakeStatus.textContent = 'Pantalla normal';
          });
        }
      } catch (err) {
        wakeStatus.textContent = 'Wake Lock no disponible';
      }
    }

    async function releaseWakeLock() {
      if (wakeLock) {
        try { await wakeLock.release(); } catch (e) {}
        wakeLock = null;
      }
      wakeStatus.textContent = 'Pantalla normal';
    }

    function currentWorkValue() {
      return Math.max(1, parseInt(inputWork.value || '1', 10));
    }

    function currentRestValue() {
      return Math.max(1, parseInt(inputRest.value || '1', 10));
    }

    function formatTime(seconds) {
      const mins = Math.floor(seconds / 60);
      const secs = seconds % 60;
      if (mins > 0) {
        return `${mins}:${String(secs).padStart(2, '0')}`;
      }
      return String(secs);
    }

    function updateUI() {
      timerDisplay.textContent = formatTime(timeLeft);
      roundDisplay.textContent = `Serie: ${round}`;

      if (!isRunning && isWork && timeLeft === currentWorkValue()) {
        document.body.style.backgroundColor = 'var(--bg-idle)';
        statusEl.textContent = 'Configurar';
        return;
      }

      document.body.style.backgroundColor = isWork ? 'var(--bg-work)' : 'var(--bg-rest)';
      statusEl.textContent = isWork ? '¡Dale!' : 'Descanso';
    }

    function setInputsDisabled(disabled) {
      inputWork.disabled = disabled;
      inputRest.disabled = disabled;
    }

    function nextPhase() {
      playSound(880, 0.45, 0.28);
      vibrate([200, 100, 200]);

      if (isWork) {
        isWork = false;
        timeLeft = currentRestValue();
      } else {
        isWork = true;
        round += 1;
        timeLeft = currentWorkValue();
      }
    }

    async function toggleTimer() {
      initAudio();

      if (isRunning) {
        clearInterval(timerInterval);
        timerInterval = null;
        isRunning = false;
        startBtn.textContent = 'Reanudar';
        await releaseWakeLock();
        updateUI();
        return;
      }

      if (!timerInterval) {
        await requestWakeLock();
      }

      setInputsDisabled(true);
      isRunning = true;
      startBtn.textContent = 'Pausa';

      timerInterval = setInterval(() => {
        timeLeft -= 1;

        if (timeLeft <= 3 && timeLeft > 0) {
          playSound(440, 0.1, 0.14);
          vibrate(90);
        }

        if (timeLeft < 0) {
          nextPhase();
        }

        updateUI();
      }, 1000);

      updateUI();
    }

    async function resetTimer() {
      clearInterval(timerInterval);
      timerInterval = null;
      isRunning = false;
      isWork = true;
      round = 1;
      timeLeft = currentWorkValue();
      startBtn.textContent = 'Empezar';
      setInputsDisabled(false);
      await releaseWakeLock();
      updateUI();
    }

    inputWork.addEventListener('input', () => {
      if (!isRunning && isWork) {
        timeLeft = currentWorkValue();
        updateUI();
      }
    });

    inputRest.addEventListener('input', () => {
      if (!isRunning && !isWork) {
        timeLeft = currentRestValue();
        updateUI();
      }
    });

    startBtn.addEventListener('click', toggleTimer);
    resetBtn.addEventListener('click', resetTimer);

    document.addEventListener('visibilitychange', async () => {
      if (document.visibilityState === 'visible' && isRunning) {
        await requestWakeLock();
      }
    });

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
      });
    }

    updateUI();
  </script>
</body>
</html>
